version: 2

models:
  - name: mart_establishment_performance
    description: "Aggregated delivery platform performance by country, joining establishment and technology data"
    columns:
      - name: delivery_platform
        description: "The delivery platform (e.g. DoorDash, Uber Eats)"
        tests:
          - not_null
      - name: establishment_country_code
        description: "Country code of the establishment"
        tests:
          - not_null
      - name: establishment_count
        description: "Distinct count of establishments per platform and country"
        tests:
          - not_null
      - name: avg_rating_score
        description: "Average establishment rating score, rounded to 2 decimal places"
      - name: total_review_count
        description: "Total number of reviews across all establishments"